name: Build Rootless Jailbreak Tweak

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Homebrew Dependencies
      run: |
        brew install lz4 xz zstd dpkg ldid

    - name: Manually Install Theos
      run: |
        # Clone Theos directly into the runner's home directory
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        
        # Set environment variable for subsequent steps
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Manually Clone Patched SDKs
      run: |
        # Remove the pre-existing empty sdks folder so git doesn't complain
        rm -rf $HOME/theos/sdks
        
        # Manually clone the SDKs repo safely
        git clone https://github.com/theos/sdks.git $HOME/theos/sdks

    - name: Flatten and Fix Source Code
      run: |
        cd Checkl0ck
        
        # Create a Python script to dynamically inline the broken header code structure
        cat << 'EOF' > inline_headers.py
        import os, re

        def inline_file(filepath):
            with open(filepath, 'r') as f:
                content = f.read()
            
            # Find any local custom #import statements
            imports = re.findall(r'#(?:import|include)\s+"([^"]+)"', content)
            for imp in imports:
                if os.path.exists(imp):
                    # Recursively resolve and inline the content of that header file
                    inlined_content = inline_file(imp)
                    content = content.replace(f'#import "{imp}"', inlined_content)
                    content = content.replace(f'#include "{imp}"', inlined_content)
            return content

        if os.path.exists('Tweak.xm'):
            flattened = inline_file('Tweak.xm')
            with open('Tweak.xm', 'w') as f:
                f.write(flattened)
            print("Successfully flattened header structures directly into Tweak.xm!")
        EOF
        
        python3 inline_headers.py
        rm inline_headers.py
        
    - name: Compile Tweak (.deb)
      run: |
        # Explicitly setting the target to iphoneos:clang and defining rootless scheme
        cd Checkl0ck
        make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless TARGET=iphone:clang:latest:15.0 ARCHS="arm64 arm64e" PREFIX="" ADDITIONAL_CFLAGS="-w" ADDITIONAL_LOGOSFLAGS="-w"
      env:
        # Some legacy Makefiles check this instead, so we provide both safely
        PREFIX: /opt/homebrew/bin/

    - name: Upload .deb Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CheckL0ck-Rootless-Deb
        path: packages/*.deb
        if-no-files-found: error
