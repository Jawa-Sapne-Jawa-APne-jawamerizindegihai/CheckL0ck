name: Build Rootless Jailbreak Tweak

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Homebrew Dependencies
      run: |
        brew install lz4 xz zstd dpkg ldid

    - name: Manually Install Theos
      run: |
        # Clone Theos directly into the runner's home directory
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        
        # Set environment variable for subsequent steps
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Manually Clone Patched SDKs
      run: |
        # Remove the pre-existing empty sdks folder so git doesn't complain
        rm -rf $HOME/theos/sdks
        
        # Manually clone the SDKs repo safely
        git clone https://github.com/theos/sdks.git $HOME/theos/sdks

    - name: Flatten and Fix Source Code
      run: |
        cd Checkl0ck
        # 1. Change the #import references inside Tweak.xm to look for .xm files instead of .h
        sed -i '' 's/#import "ChecklCManager.h"/#import "ChecklCManager.xm"/' Tweak.xm
        sed -i '' 's/#import "ChecklCPasscodeViewController.h"/#import "ChecklCPasscodeViewController.xm"/' Tweak.xm
        
        # 2. Change the reference inside ChecklCManager.h before renaming it
        sed -i '' 's/#import "ChecklCPasscodeViewController.h"/#import "ChecklCPasscodeViewController.xm"/' ChecklCManager.h

        # 3. Rename the files so the Theos/Logos engine pre-processes them natively
        mv ChecklCManager.h ChecklCManager.xm
        mv ChecklCPasscodeViewController.h ChecklCPasscodeViewController.xm
        
    - name: Compile Tweak (.deb)
      run: |
        # Explicitly setting the target to iphoneos:clang and defining rootless scheme
        cd Checkl0ck
        make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless TARGET=iphone:clang:latest:15.0 ARCHS="arm64 arm64e" PREFIX="" ADDITIONAL_CFLAGS="-x objective-c++ -w -Wno-error"
      env:
        # Some legacy Makefiles check this instead, so we provide both safely
        PREFIX: /opt/homebrew/bin/

    - name: Upload .deb Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CheckL0ck-Rootless-Deb
        path: packages/*.deb
        if-no-files-found: error
